name: 部署到 GitHub Pages

on:
  push:
    branches:
      - main   # 推送到 main 分支时自动触发
  workflow_dispatch: # 支持手动触发

# 授予 GitHub Pages 部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行，但不取消正在进行的任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 构建静态文件
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm next build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out  # Next.js 静态导出目录

  deploy:
    name: 部署到 GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
